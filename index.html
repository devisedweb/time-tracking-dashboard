<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Time tracking dashboard</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <!-- <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style> -->
  </head>
  <body>
    <main>
      <div>
        <div>
          <div>
            <img src="./images/image-jeremy.png" alt="" />

            <div class="user-info">
              <p>Report for</p>
              <h1>Jeremy Robson</h1>
            </div>
          </div>

          <div class="timeframe-selector">
            <p>Daily</p>
            <p>Weekly</p>
            <p>Monthly</p>
          </div>
        </div>
      </div>

      <div class="work-container">
        <div class="work-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Work</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p>32hrs</p>
              <p>Last Week - 36hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="play-container">
        <div class="play-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Play</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p>10hrs</p>
              <p>Last Week - 36hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="study-container">
        <div class="study-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Study</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p>4hrs</p>
              <p>Last Week - 7hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="exercise-container">
        <div class="exercise-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Exercise</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p>4hrs</p>
              <p>Last Week - 5hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="social-container">
        <div class="social-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Social</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p>5hrs</p>
              <p>Last Week - 10hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="selfcare-container">
        <div class="selfcare-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Self Care</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p>2hrs</p>
              <p>Last Week - 2hrs</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- <footer class="attribution">

    </footer> -->
  </body>
</html>
