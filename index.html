<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Time tracking dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <div>
        <div>
          <div>
            <img src="./images/image-jeremy.png" alt="" />

            <div class="user-info">
              <p>Report for</p>
              <h1>Jeremy Robson</h1>
            </div>
          </div>

          <div class="timeframe-selector">
            <p>Daily</p>
            <p>Weekly</p>
            <p>Monthly</p>
          </div>
        </div>
      </div>

      <div class="work-container" data-activity="work">
        <div class="work-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Work</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p class="current">32hrs</p>
              <p class="previous">Last Week - 36hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="play-container" data-activity="play">
        <div class="play-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Play</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p class="current">10hrs</p>
              <p class="previous">Last Week - 36hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="study-container" data-activity="study">
        <div class="study-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Study</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p class="current">4hrs</p>
              <p class="previous">Last Week - 7hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="exercise-container" data-activity="exercise">
        <div class="exercise-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Exercise</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p class="current">4hrs</p>
              <p class="previous">Last Week - 5hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="social-container" data-activity="social">
        <div class="social-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Social</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p class="current">5hrs</p>
              <p class="previous">Last Week - 10hrs</p>
            </div>
          </div>
        </div>
      </div>

      <div class="selfcare-container" data-activity="selfcare">
        <div class="selfcare-bg"></div>

        <div class="activity-bg">
          <div>
            <div class="activity-header">
              <p>Self Care</p>
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>

            <div class="activity-stats">
              <p class="current">2hrs</p>
              <p class="previous">Last Week - 2hrs</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer> -->
  </body>
</html>
